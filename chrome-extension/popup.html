<!DOCTYPE html>
<html>
<head>
  <title>HumanizeIt</title>
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #f8fafc;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: #6C63FF;
      border-radius: 6px;
    }
    h1 {
      font-size: 18px;
      margin: 0;
      color: #1e293b;
    }
    textarea {
      width: 100%;
      height: 150px;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 12px;
      outline: none;
    }
    textarea:focus {
      border-color: #6C63FF;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #6C63FF;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #64748b;
    }
    a {
      color: #6C63FF;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div className="header">
    <div className="logo"></div>
    <h1>HumanizeIt</h1>
  </div>
  <textarea id="input" placeholder="Paste AI text to humanize..."></textarea>
  <button id="humanizeBtn">Humanize Now</button>
  <div className="footer">
    <p>Powered by <a href="https://humanize-it1.vercel.app" target="_blank">HumanizeIt</a></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
